<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="24" fill="#002366"/>
  <!-- Car body -->
  <rect x="18" y="62" width="84" height="28" rx="6" fill="#ffffff"/>
  <rect x="30" y="44" width="60" height="26" rx="8" fill="#ffffff"/>
  <!-- Windows -->
  <rect x="35" y="49" width="22" height="16" rx="4" fill="#002366" opacity="0.7"/>
  <rect x="63" y="49" width="22" height="16" rx="4" fill="#002366" opacity="0.7"/>
  <!-- Wheels -->
  <circle cx="35" cy="91" r="11" fill="#002366"/>
  <circle cx="35" cy="91" r="6" fill="#c0c8dc"/>
  <circle cx="85" cy="91" r="11" fill="#002366"/>
  <circle cx="85" cy="91" r="6" fill="#c0c8dc"/>
  <!-- Wrench -->
